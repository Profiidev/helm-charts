---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: headplane
  labels:
    app: headplane
spec:
  selector:
    matchLabels:
      app: headplane
  template:
    metadata:
      labels:
        app: headplane
    spec:
      shareProcessNamespace: true
      serviceAccountName: headplane
      initContainers:
      - name: wait-for-token
        image: alpine/kubectl:latest
        command:
          - sh
          - -c
          - |
            echo "Waiting for headscale-generate-token job to complete..."
            kubectl wait --for=condition=complete job/headscale-generate-token -n {{ .Release.Namespace }} --timeout=300s
            echo "Job completed successfully, starting headplane..."
      containers:
      - name: headplane
        image: {{ .Values.headplane.image }}
        envFrom:
          - secretRef:
              name: headscale-api-token
          {{- if .Values.headplane.oidc.enabled }}
          - secretRef:
              name: {{ .Values.headplane.oidc.secret_name }}
          {{- end }}
          {{- with .Values.headplane.envFrom }}
          {{- toYaml . | nindent 10 }}
          {{- end }}
        env:
        - name: 'HEADPLANE_INTEGRATION__KUBERNETES__POD_NAME'
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: headplane-config
          mountPath: /etc/headplane
        - name: headscale-data
          mountPath: /etc/headscale
      volumes:
        - name: headplane-config
          secret:
            secretName: headplane-config
        - name: headscale-data
          persistentVolumeClaim:
            claimName: headscale-data
