---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: {{ .Values.secret.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Chart.Name }}
  dataFrom:
    - extract:
        key: {{ .Values.secret.path }}
