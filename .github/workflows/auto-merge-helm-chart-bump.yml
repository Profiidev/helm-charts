name: Auto Merge PR with Helm Chart Version Bump

on:
  pull_request:
    types:
      - labeled

jobs:
  merge:
    if: ${{ github.event.label.name == 'bump-chart' && github.event.pull_request.user.login == 'profidev-commit-bot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          client-id: ${{ secrets.COMMIT_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COMMIT_BOT_PRIVATE_KEY }}
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Enable auto-merge for PR
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
